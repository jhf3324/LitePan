# LitePan DEB package build workflow
name: Build LitePan DEB Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.3.1-Beta)'
        required: false
        default: '0.3.1-Beta'

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build DEB Package
        run: |
          VERSION="${{ github.event.inputs.version || '0.3.1-Beta' }}"
          PKG_DIR="${{ runner.temp }}/litepan"
          DEB_NAME="litepan_${VERSION}_all.deb"

          # === Create directory structure ===
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/opt/litepan"
          mkdir -p "$PKG_DIR/lib/systemd/system"

          # === Copy all source code (excluding .git .github node_modules) ===
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' \
            "$GITHUB_WORKSPACE/" "$PKG_DIR/opt/litepan/"

          # === DEBIAN/control ===
          cat > "$PKG_DIR/DEBIAN/control" << EOF
Package: litepan
Version: ${VERSION}
Section: net
Priority: optional
Architecture: all
Depends: python3, python3-pip
Maintainer: LitePan Builder <build@litepan.local>
Description: LitePan - 多网盘聚合与管理工具
 轻量级网盘挂载系统，支持 WebDAV、STRM、媒体整理等功能。
 默认端口 5211，安装后访问 http://<设备IP>:5211 即可使用。
Homepage: https://github.com/jhf3324/LitePan
EOF

          # === DEBIAN/postinst ===
          cat > "$PKG_DIR/DEBIAN/postinst" << 'POSTINST'
#!/bin/bash
set -e

APP_DIR="/opt/litepan"

echo "[LitePan] 安装 Python 依赖..."
cd "$APP_DIR"
pip3 install --no-cache-dir -r requirements.txt 2>&1 | tail -5

echo "[LitePan] 创建运行时目录..."
mkdir -p "$APP_DIR/data" "$APP_DIR/log" "$APP_DIR/strm"

echo "[LitePan] 注册 systemd 服务..."
systemctl daemon-reload
systemctl enable litepan.service
systemctl start litepan.service || echo "[LitePan] 注意: 服务已启用，首次启动可能需要手动检查状态"

echo ""
echo "============================================"
echo "  LitePan 安装完成!"
echo "  访问 http://$(hostname -I | awk '{print $1}'):5211"
echo "  默认账号: admin / admin"
echo "============================================"
POSTINST
          chmod 755 "$PKG_DIR/DEBIAN/postinst"

          # === lib/systemd/system/litepan.service ===
          cat > "$PKG_DIR/lib/systemd/system/litepan.service" << 'SERVICE'
[Unit]
Description=LitePan - Multi-cloud drive aggregation tool
After=network.target

[Service]
Type=simple
User=root
WorkingDirectory=/opt/litepan
ExecStart=/usr/bin/python3 /opt/litepan/main.py
Restart=on-failure
RestartSec=5
StandardOutput=journal
StandardError=journal
Environment=PYTHONUNBUFFERED=1

[Install]
WantedBy=multi-user.target
SERVICE

          # === Build .deb ===
          dpkg-deb --build "$PKG_DIR" "${{ runner.temp }}/$DEB_NAME"
          echo "deb_path=${{ runner.temp }}/$DEB_NAME" >> "$GITHUB_ENV"
          echo "deb_name=$DEB_NAME" >> "$GITHUB_ENV"

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: litepan-deb
          path: ${{ env.deb_path }}
