name: Build LitePan DEB Package
on:
  workflow_dispatch:
jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build DEB
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          # Decode and run the build script (avoids CRLF issues)
          echo '' | base64 -d > /tmp/build-simple.sh
          bash /tmp/build-simple.sh
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: litepan-deb
          path: ${{ runner.temp }}/litepan_*.deb
